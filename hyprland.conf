-- ~/.config/hypr/hyprpaper.conf -- 
# ── Variables ─────────────────────────────────
$mainMod = SUPER
$terminal = kitty
$fileManager = dolphin
$menu = rofi -show drun

# ── Autostart ─────────────────────────────────
exec-once = swaybg -i ~/wallpapers/wall1.png -m fill
exec-once = waybar
exec-once = swaync
exec-once = hypridle
exec-once = nm-applet
exec-once = wl-paste --type text --watch cliphist store


# ── Input ─────────────────────────────────────
input {
    kb_layout = latam
    kb_model =
    kb_variant =
    kb_options =
    kb_rules =

follow_mouse = 1
    sensitivity = 0
}


# ── General ───────────────────────────────────
general {
    gaps_in = 5
    gaps_out = 12
    border_size = 2
    col.active_border = rgba(00ffffee) rgba(ff00ffee) 45deg
    col.inactive_border = rgba(1a1a2e99)
    layout = dwindle
}

# ── Decoración ────────────────────────────────
decoration {
    rounding = 12
    blur {
        enabled = true
        size = 8
        passes = 3
        new_optimizations = true

xray = false
    }
    shadow {
        enabled = true
        range = 20
        render_power = 3
        color = rgba(00ffff33)
    }
    active_opacity = 1.0
    inactive_opacity = 0.92
    dim_inactive = true
    dim_strength = 0.2
}
# ── Animaciones ───────────────────────────────
animations {
    enabled = true
    bezier = neon, 0.05, 0.9, 0.1, 1.05
    bezier = linear, 0, 0, 1, 1
    animation = windows, 1, 5, neon, slide
    animation = windowsOut, 1, 4, default, popin 80%
    animation = fade, 1, 5, neon
    animation = workspaces, 1, 5, neon, slidevert
    animation = border, 1, 8, linear
    animation = borderangle, 1, 80, linear, loop
}

# ── Misc ──────────────────────────────────────
misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
}



# ── Window Rules ──────────────────────────────
hl.window_rule({ match = { class = "firefox" },       workspa>
hl.window_rule({ match = { class = "brave-browser" }, workspa>
hl.window_rule({ match = { class = "code-oss" },      workspa>
hl.window_rule({ match = { class = "spotify" },       workspa>
hl.window_rule({ match = { class = "discord" },       workspa>

hl.window_rule({ match = { class = "pavucontrol" },          >
hl.window_rule({ match = { class = "nm-connection-editor" }, >
hl.window_rule({ match = { class = "dolphin" },              >
hl.window_rule({ match = { title = "btop" },                 >
hl.window_rule({ match = { title = "Picture-in-Picture" },   >

hl.window_rule({ match = { class = "kitty" },   opacity = "0.>
hl.window_rule({ match = { class = "kitty" },   opacity = "0.>
hl.window_rule({ match = { class = "firefox" }, opacity = "1.>

# ── Keybinds básicos ──────────────────────────
bind = $mainMod, RETURN, exec, $terminal
bind = $mainMod, SPACE, exec, rofi -show drun -theme ~/.confi>
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, L, exec, hyprlock
bind = $mainMod SHIFT, E, exec, ~/.config/rofi/scripts/powerm>

# ── Ventanas ──────────────────────────────────
bind = $mainMod, Q, killactive
bind = $mainMod, T, togglefloating
bind = $mainMod, F, fullscreen, 0
bind = $mainMod SHIFT, F, fullscreen, 1
bind = $mainMod, C, centerwindow

# ── Mouse ─────────────────────────────────────
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# ── Foco ──────────────────────────────────────
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# ── Mover ventanas ────────────────────────────
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d

# ── Resize ────────────────────────────────────
binde = $mainMod CTRL, right, resizeactive, 40 0
binde = $mainMod CTRL, left, resizeactive, -40 0
binde = $mainMod CTRL, up, resizeactive, 0 -40
binde = $mainMod CTRL, down, resizeactive, 0 40

# ── Workspaces ────────────────────────────────
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# ── Notificaciones ────────────────────────────
bind = $mainMod, N, exec, swaync-client -t
bind = $mainMod SHIFT, N, exec, swaync-client -d

# ── Portapapeles ──────────────────────────────
bind = $mainMod, V, exec, cliphist list | rofi -dmenu -theme >

# ── Screenshots ───────────────────────────────
bind = , XF86SelectiveScreenshot, exec, grim -g "$(slurp)" - >
bind = SHIFT, XF86SelectiveScreenshot, exec, grim ~/Pictures/>

# ── Btop ──────────────────────────────────────
bind = $mainMod, B, exec, kitty --title btop -e btop

# ── Media ─────────────────────────────────────
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFA>
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFA>
bindl  = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO>
bindl  = , XF86AudioPlay, exec, playerctl play-pause
bindl  = , XF86AudioNext, exec, playerctl next
bindl  = , XF86AudioPrev, exec, playerctl prev
