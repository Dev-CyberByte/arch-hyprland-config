# ─── Fuente 
font_family      JetBrainsMono Nerd Font
font_size        12.5
bold_font        JetBrainsMono Nerd Font Bold
italic_font      JetBrainsMono Nerd Font Italic

# ─── Ventana 
background_opacity        0.92
window_padding_width      16
hide_window_decorations   yes
confirm_os_window_close   0
remember_window_size      yes
resize_in_steps           yes

# ─── Cursor 
cursor                    #ffffff
cursor_text_color         #0a0a0a
cursor_shape              beam
cursor_beam_thickness     1.5
cursor_blink_interval     0

# ─── Paleta monocromática 
background            #0a0a0a
foreground            #e8e8e8

selection_background  #e8e8e8
selection_foreground  #0a0a0a

color0   #1a1a1a
color1   #e05c5c
color2   #7ec99a
color3   #d4b96a
color4   #6a9fd4
color5   #b06ab4
color6   #6ab4b4
color7   #c8c8c8
color8   #3a3a3a
color9   #ff7070
color10  #9adbb6
color11  #e8cc80
color12  #80b4e8
color13  #c880cc
color14  #80cccc
color15  #ffffff

# ─── Tabs 
tab_bar_style               separator
tab_separator               " │ "
tab_title_template          "{index}: {title}"
active_tab_foreground       #ffffff
active_tab_background       #0a0a0a
active_tab_font_style       bold
inactive_tab_foreground     #444444
inactive_tab_background     #0a0a0a
inactive_tab_font_style     normal
tab_bar_background          #0a0a0a
tab_bar_margin_height       4 0

# ─── Scroll 
scrollback_lines          4000
wheel_scroll_multiplier   3.0

# ─── Keymaps 
map ctrl+shift+t    new_tab_with_cwd
map ctrl+shift+enter new_window_with_cwd
map ctrl+shift+l    next_tab
map ctrl+shift+h    previous_tab
